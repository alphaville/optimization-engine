name: Continuous integration

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci_linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DO_DOCKER: 0
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: arm-unknown-linux-gnueabihf
          rustflags: ""

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"
          cache-dependency-path: open-codegen/setup.py

      - uses: egor-tensin/setup-clang@v1

      - name: Install ARM cross-compiler and C libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross

      - name: Cargo tests
        run: cargo test

      - name: Cargo tests (RP and JEM)
        run: |
          cargo test --features rp
          cargo test --features jem

      - name: Run tests (script.sh)
        env:
          CC_arm_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          AR_arm_unknown_linux_gnueabihf: arm-linux-gnueabihf-ar
        run: bash ./ci/script.sh

  ci_macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      DO_DOCKER: 0
      SKIP_RPI_TEST: 1
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: open-codegen/setup.py

      - name: Install LLVM
        run: brew install llvm

      - name: Cargo tests
        run: cargo test

      - name: Cargo tests (RP and JEM)
        run: |
          cargo test --features rp
          cargo test --features jem

      - name: Run tests (script.sh)
        run: bash ./ci/script.sh
